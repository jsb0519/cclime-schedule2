*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard","Noto Sans KR",-apple-system,sans-serif;background:#F0F2F5;color:#1a1a2e;overflow-x:hidden}
.app-header{background:#1a1a2e;color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.app-title{font-size:17px;font-weight:800;white-space:nowrap}
.tabs{display:flex;gap:3px}
.tab-btn{padding:6px 14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:#aaa;background:transparent;transition:.15s}
.tab-btn.active{background:#4F46E5;color:#fff}

.view{display:none;padding:16px}
.view.active{display:block}

.summary{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}

.tbl-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:auto}
.dash-tbl{width:100%;border-collapse:collapse;font-size:12px}
.dash-tbl th{background:#E91E8C;color:#fff;padding:9px 7px;font-weight:600;white-space:nowrap;position:sticky;top:0}
.dash-tbl td{padding:7px 6px;border-bottom:1px solid #F0F0F0;vertical-align:top}
.dash-tbl tr:hover td{filter:brightness(.97)}
.emp-tag{display:block;line-height:1.8;white-space:nowrap;font-size:11px}

const FB_BASE = 'https://cclime-schedule-cb047-default-rtdb.asia-southeast1.firebasedatabase.app';
function fbUrl(y, m) { return `${FB_BASE}/schedule/${y}_${String(m).padStart(2,'0')}.json`; }
function fetchTimed(url, opts, ms = 8000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(t));
}
async function fbGet(y, m) {
  try {
    const r = await fetchTimed(fbUrl(y, m));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return fromFbData(await r.json());
  } catch(e) { return null; }
}
async function fbSet(y, m, data) {
  const r = await fetchTimed(fbUrl(y, m), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(toFbData(data))
  });
  if (!r.ok) {
    const msg = await r.text().catch(() => '');
    throw new Error('HTTP ' + r.status + (msg ? ': ' + msg.slice(0,80) : ''));
  }
}

function showTab(t) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  document.getElementById('view-' + t).classList.add('active');

/* ── 직원 데이터 로드 (GViz JSONP) ── */
function loadEmployees() {
  setStat('불러오는 중...');
  const old = document.getElementById('_gviz');
  if (old) old.remove();
  const s = document.createElement('script');
  s.id = '_gviz';
  s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&_=${Date.now()}`;
  s.onerror = () => setStat('구글 시트 연결 실패 — 시트 공개 여부 확인');
  document.head.appendChild(s);
}

function onEmployeeData(resp) {
  try {
    if (!resp || resp.status !== 'ok') throw new Error('응답 오류');
    const cols = resp.table.cols;
    const rows = resp.table.rows;

    let iB=-1, iN=-1, iR=-1, iL=-1, iD=-1, iW=-1, iE=-1;
    const findIdx = (arr) => arr.forEach((c, i) => {
      const t = String(c?.label ?? c?.v ?? c?.f ?? '').trim();
      if (t==='지점') iB=i;
      else if (t==='이름') iN=i;
      else if (t==='직무'||t==='직급') iR=i;
      else if (t==='벨트'||t==='등급') iL=i;
      else if (t==='입사일'||t.includes('입사')) iD=i;
      else if (t==='근무형태'||t.includes('근무형태')) iW=i;
      else if (t.includes('퇴사')||t.includes('퇴직')) iE=i;
    });
    findIdx(cols);
    const colsResult = {iB, iN, iR, iL, iD, iW, iE}; // cols 탐색 결과 저장

    let dataStart = 0;
    if (iB<0 || iN<0 || iE<0) { // iE 미발견도 행 탐색 트리거
      for (let ri=0; ri<Math.min(rows.length,5); ri++) {
        const cells = (rows[ri].c||[]).map(c => ({label: String(c?.f||c?.v||'').trim()}));
        iB=-1; iN=-1; iR=-1; iL=-1; iD=-1; iW=-1; iE=-1;
        findIdx(cells);
        if (iB>=0 && iN>=0) { dataStart=ri+1; break; }
      }
      // 행에서도 못 찾은 인덱스는 cols 결과로 보충
      if(iB<0)iB=colsResult.iB; if(iN<0)iN=colsResult.iN; if(iR<0)iR=colsResult.iR;
      if(iL<0)iL=colsResult.iL; if(iD<0)iD=colsResult.iD; if(iW<0)iW=colsResult.iW;
      if(iE<0)iE=colsResult.iE;
    }
    if (iB<0) iB=1; if (iN<0) iN=2; if (iR<0) iR=3; if (iL<0) iL=4; if (iD<0) iD=7; if (iW<0) iW=5;
    // iE 최후 수단: 텍스트 탐지 실패 시 입사일 이후 첫 번째 date 타입 컬럼으로 추론
    if (iE < 0 && iD >= 0) {
      cols.forEach((c, i) => { if (iE<0 && (c.type==='date'||c.type==='datetime') && i>iD) iE=i; });
    }

    const getStr = (row, i) => (i>=0 && row.c && row.c[i]) ? String(row.c[i].f||row.c[i].v||'').trim() : '';
    const parseDate = (cell) => {
      if (!cell) return '';
      const src = String(cell.f||'') + ' ' + String(cell.v||'');
      const m = src.match(/Date\((\d{4}),(\d{1,2}),(\d{1,2})\)/);
      if (m) return `${m[1]}-${String(parseInt(m[2])+1).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
      const m2 = src.match(/(\d{4})[.\-\s\/년]+(\d{1,2})[.\-\s\/월]+(\d{1,2})/);
      if (m2) return `${m2[1]}-${String(m2[2]).padStart(2,'0')}-${String(m2[3]).padStart(2,'0')}`;
      return '';
    };

    employees = [];
    rows.slice(dataStart).forEach(row => {
      const branch = getStr(row, iB);
      const name   = getStr(row, iN);
      if (!branch || !name) return;
      const role     = getStr(row, iR);
      const beltRaw  = getStr(row, iL);
      const belt     = BELT_ORDER.includes(beltRaw) ? beltRaw : '실습생';
      const hireDate = iD>=0 ? parseDate(row.c && row.c[iD]) : '';
      const workType  = getStr(row, iW);
      let exitDate = '';
      if (iE >= 0) {
        exitDate = parseDate(row.c && row.c[iE]);
        if (!exitDate) {
          // parseDate 실패 시 텍스트 값으로 재시도
          const raw = getStr(row, iE);
          const m2 = raw.match(/(\d{4})[.\-\s\/년]+(\d{1,2})[.\-\s\/월]+(\d{1,2})/);
          if (m2) exitDate = `${m2[1]}-${String(m2[2]).padStart(2,'0')}-${String(m2[3]).padStart(2,'0')}`;
        }
      }
      employees.push({ branch, name, role, belt, hire_date: hireDate, work_type: workType, exit_date: exitDate });
    });

    renderDashboard();
    populateBranches();
    const exitCount = employees.filter(e => e.exit_date).length;
    setStat(`최종: ${new Date().toLocaleTimeString('ko-KR')} · 퇴사예정 ${exitCount}명 감지`);

    // 신규 직원 항목을 로컬 스케줄에 추가
    let newAdded = false;
    employees.forEach(emp => {
      const key = emp.branch + '||' + emp.name;
      if (!schData[key]) { schData[key] = mkEntry(emp); newAdded = true; }
    });
    if (newAdded) {
      saveLs(curY, curM, schData);
      if (fbListenerAttached) fbSet(curY, curM, schData).catch(() => {});  // toFbData는 fbSet 내부에서 처리
    }
    if (document.getElementById('view-schedule').classList.contains('active')) buildTable();
  } catch(e) {
    setStat('파싱 오류: ' + e.message);
  }
}

function lsKey(y, m) { return `cclime_sch_${y}_${String(m).padStart(2,'0')}`; }
function loadLs(y, m) {

function saveLs(y, m, data) {

/* ── Firebase 유틸 ── */
/* Firebase 배열 복원 */
function toArr(v) { return Array.isArray(v) ? v : (v && typeof v === 'object' ? Object.values(v) : []); }
function normEntry(e) {
  if (!e || typeof e !== 'object') return e;
  const r = Object.assign({}, e);
  if ('off_days'    in r) r.off_days    = toArr(r.off_days).map(Number);
  if ('shift_slots' in r) r.shift_slots = toArr(r.shift_slots);
  return r;
}
/* Firebase 금지 문자(. # $ [ ] /)를 _ 로 치환한 키로 저장.
   읽을 때는 값 안의 branch+name으로 원본 키를 복원. */
function toFbData(data) {
  const r = {};
  for (const [k, v] of Object.entries(data))
    r[k.replace(/[\.#\$\[\]\/]/g, '_')] = v;
  return r;
}
function fromFbData(raw) {
  if (!raw || typeof raw !== 'object') return null;
  const r = {};
  for (const v of Object.values(raw)) {
    const e = normEntry(v);
    if (e && e.branch && e.name) r[e.branch + '||' + e.name] = e;
  }
  return Object.keys(r).length ? r : null;
}

function setFbStatus(ok, msg) {
  const el = document.getElementById('fb-status');
  if (!el) return;
  el.textContent = msg;
  el.style.background = ok === true ? '#D4EDDA' : ok === false ? '#F8D7DA' : '#eee';
  el.style.color      = ok === true ? '#155724' : ok === false ? '#721C24' : '#888';
}

/* ── 5초 폴링 (읽기 전용 — 쓰기는 doSave/initMonth만) ── */
let fbListenerAttached = false;
let fbPollBusy = false;
let fbPollTimer = null;
function stopFbPoll() {
  if (fbPollTimer) { clearInterval(fbPollTimer); fbPollTimer = null; }
  fbListenerAttached = false; fbPollBusy = false;
}
function attachFb(y, m) {
  stopFbPoll();
  setFbStatus(null, '🔄 연결 중...');
  let firstPoll = true;
  const poll = async () => {
    if (fbPollBusy) return;
    fbPollBusy = true;
    try {
      const fb = await fbGet(y, m);
      if (fb) {
        fbListenerAttached = true;
        setFbStatus(true, '🟢 동기화됨');
        if (JSON.stringify(fb) !== JSON.stringify(schData)) {
          schData = fb;
          saveLs(y, m, schData);
          if (!dirty && document.getElementById('view-schedule').classList.contains('active')) {
            buildTable();
            setStat('다른 기기 변경 반영됨 · ' + new Date().toLocaleTimeString('ko-KR'));
          }
        } else if (firstPoll) {
          setStat('근무표 로드 완료 · ' + new Date().toLocaleTimeString('ko-KR'));
        }
        firstPoll = false;
      } else {
        setFbStatus(null, '⚪ Firebase 비어있음 — 📋 3개월 초기화 필요');
        setStat('Firebase 비어있음 — 📋 3개월 초기화를 눌러주세요');
        firstPoll = false;
      }
    } catch(e) {
      setFbStatus(false, '🔴 연결 오류');
      if (firstPoll) {
        setStat('Firebase 연결 오류 · 로컬 데이터 표시 중');
        firstPoll = false;
      }
    } finally {
      fbPollBusy = false;
    }
  };
  poll();
  fbPollTimer = setInterval(poll, 5000);
}

/* ── 통계 계산 ── */
function calcStats() {
  const today = new Date();
  const y = today.getFullYear(), m = today.getMonth() + 1;

  // 현재 재직자 (exit_date 없거나 이번달 이후)
  const current = employees.filter(e => {
    if (!e.exit_date || e.exit_date.length < 7) return true;
    const [ey, em] = e.exit_date.split('-').map(Number);
    return !(ey < y || (ey === y && em < m));
  });

  // 당월 입사자
  const hired = employees.filter(e => {
    if (!e.hire_date || e.hire_date.length < 7) return false;
    const [hy, hm] = e.hire_date.split('-').map(Number);
    return hy === y && hm === m;
  });

  // 당월 퇴사자
  const exited = employees.filter(e => {
    if (!e.exit_date || e.exit_date.length < 7) return false;
    const [ey, em] = e.exit_date.split('-').map(Number);
    return ey === y && em === m;
  });

  // 평균 재직인원 = (월초인원 + 월말인원) / 2
  const monthStart = Math.max(0, current.length + exited.length - hired.length);
  const avg = (monthStart + current.length) / 2 || current.length || 1;

  // 당월 퇴사율
  const turnover1m = exited.length / avg * 100;

  // 최근 3개월 퇴사자 (이번달 포함)
  const [y3, m3] = (() => { const d = new Date(y, m - 3, 1); return [d.getFullYear(), d.getMonth() + 1]; })();
  const exited3m = employees.filter(e => {
    if (!e.exit_date || e.exit_date.length < 7) return false;
    const [ey, em] = e.exit_date.split('-').map(Number);
    const ym = ey * 12 + em, from = y3 * 12 + m3, to = y * 12 + m;
    return ym >= from && ym <= to;
  });
  const turnover3m = exited3m.length / avg * 100;

  // 평균 근속기간 (월 단위)
  const withHire = current.filter(e => e.hire_date && e.hire_date.length >= 7);
  const avgMonths = withHire.length
    ? withHire.reduce((s, e) => {
        const [hy, hm, hd='1'] = e.hire_date.split('-');
        const ms = today - new Date(+hy, +hm - 1, +hd);
        return s + ms / (1000 * 60 * 60 * 24 * 30.44);
      }, 0) / withHire.length
    : 0;

  return { hired: hired.length, exited: exited.length,
           net: hired.length - exited.length,
           turnover1m, turnover3m, avgMonths, currentCount: current.length };
}

/* ── 월 스케줄 생성 (y년 m월) ── */
function buildMonthSchedule(y, m) {
  const daysInMonth = new Date(y, m, 0).getDate();
  const ROT_INTERVAL = 2;
  const FW5 = {0:0, 1:2, 2:2, 3:1, 4:0, 5:0, 6:0};
  const FW4 = {0:0, 1:3, 2:2, 3:1, 4:1, 5:0, 6:0};

  // ══ PHASE 1: 주 단위 휴무 배정 ══
  const dayLoad = {};
  for (let d = 1; d <= daysInMonth; d++) dayLoad[d] = 0;

  const empData = [];
  employees.forEach(emp => {
    const wt = parseWorkType(emp.work_type || '');
    const storeHours = wt.hours + 1;
    const daysPerWeek = wt.days;

    let startDay = 1;
    if (emp.hire_date && emp.hire_date.length >= 10) {
      const [hy, hm, hd] = emp.hire_date.split('-').map(Number);
      if (hy > y || (hy === y && hm > m)) return; // 미입사 — 제외
      if (hy === y && hm === m) startDay = hd;
    }

    let endDay = daysInMonth;
    if (emp.exit_date && emp.exit_date.length >= 10) {
      const [ey, em, ed] = emp.exit_date.split('-').map(Number);
      if (ey < y || (ey === y && em < m)) return; // 이미 퇴사 — 제외
      if (ey === y && em === m) endDay = ed;
    }

    const key = emp.branch + '||' + emp.name;
    const availDays = [];
    for (let d = startDay; d <= endDay; d++) availDays.push(d);
    availDays.forEach(d => dayLoad[d]++);

    const slots = getSlots(storeHours);
    const hireDow = new Date(y, m-1, startDay).getDay();
    const isHireMonth = !!(emp.hire_date && emp.hire_date.length >= 10 &&
      (() => { const [hy, hm] = emp.hire_date.split('-').map(Number); return hy === y && hm === m; })());
    empData.push({ key, emp, startDay, endDay, availDays, daysPerWeek, storeHours, slots, hireDow, isHireMonth });
  });

  // 월~일 기준 주 목록 구성
  const weeks = [];
  let wd = [];
  for (let d = 1; d <= daysInMonth; d++) {
    wd.push(d);
    if (new Date(y, m-1, d).getDay() === 0 || d === daysInMonth) { weeks.push([...wd]); wd = []; }
  }

  const offMap = {};
  empData.forEach(({ key }) => offMap[key] = new Set());

  weeks.forEach(wDays => {
    const wEmp = [];
    empData.forEach(({ key, emp, startDay, endDay, daysPerWeek, hireDow, isHireMonth }) => {
      const available = wDays.filter(d => d >= startDay && d <= endDay);
      if (!available.length) return;
      const offPerWeek = 7 - daysPerWeek;
      const isHireWeek = isHireMonth && startDay >= wDays[0] && startDay <= wDays[wDays.length - 1];
      let nOff;
      if (isHireWeek) {
        const table = daysPerWeek <= 4 ? FW4 : FW5;
        nOff = Math.min(table[hireDow] || 0, available.length);
      } else {
        nOff = Math.round(available.length * offPerWeek / 7);
      }
      wEmp.push({ key, available, nOff, startDay, endDay, isHireMonth });
    });
    wEmp.sort((a, b) => b.nOff - a.nOff);
    wEmp.forEach(({ key, available, nOff, startDay, endDay, isHireMonth }) => {
      if (!nOff) return;
      const noOff = isHireMonth ? new Set([startDay, startDay+1, startDay+2]) : new Set();
      // 퇴사 당일은 반드시 근무 — 이번 달 퇴사자(endDay < 월말)만 적용
      if (endDay < daysInMonth) noOff.add(endDay);
      const candidates = available.filter(d => !noOff.has(d));
      [...candidates].sort((a, b) => dayLoad[b] - dayLoad[a]).slice(0, Math.min(nOff, candidates.length))
        .forEach(d => { offMap[key].add(d); dayLoad[d]--; });
    });
  });

  // ══ PHASE 2: 출근시간 배정 — 2일 로테이션 + 당일 스태거 ══
  const bIdx = b => { const i = BELT_ORDER.indexOf(b); return i >= 0 ? i : 8; };

  const branchEmpList = {};
  empData.forEach(({ key, emp }) => {
    (branchEmpList[emp.branch] = branchEmpList[emp.branch] || []).push({ key, belt: emp.belt || '화이트' });
  });
  Object.values(branchEmpList).forEach(arr => arr.sort((a, b) => bIdx(a.belt) - bIdx(b.belt)));

  const baseOffsetMap = {};
  Object.values(branchEmpList).forEach(arr =>
    arr.forEach(({ key }, pos) => baseOffsetMap[key] = pos)
  );

  const startsByKeyDay = {};
  empData.forEach(({ key }) => startsByKeyDay[key] = {});

  for (let d = 1; d <= daysInMonth; d++) {
    const byBranch = {};
    empData.forEach(({ key, emp, startDay, endDay, slots }) => {
      if (d < startDay || d > endDay || offMap[key].has(d)) return;
      (byBranch[emp.branch] = byBranch[emp.branch] || []).push({ key, slots, belt: emp.belt || '화이트' });
    });
    const rot = Math.floor((d - 1) / ROT_INTERVAL);
    Object.values(byBranch).forEach(workers => {
      workers.sort((a, b) => bIdx(a.belt) - bIdx(b.belt));
      workers.forEach(({ key, slots }, pos) => {
        startsByKeyDay[key][String(d)] = slots[(pos + rot) % slots.length];
      });
    });
  }

  // ══ schData 구성 ══
  const result = {};
  empData.forEach(({ key, emp, storeHours, slots }) => {
    result[key] = {
      name: emp.name, branch: emp.branch, belt: emp.belt || '화이트',
      hire_date: emp.hire_date || '', exit_date: emp.exit_date || '', work_type: emp.work_type || '',
      shift_hours: storeHours, shift_slots: slots,
      shift_base_offset: baseOffsetMap[key] || 0,
      rotation_interval: ROT_INTERVAL,
      shift_starts: startsByKeyDay[key] || {},
      off_days: [...offMap[key]].sort((a, b) => a - b)
    };
  });
  return result;
}

/* ── 이달+2개월 초기화 ── */
function addMonth(y, m, n) {
  const d = new Date(y, m - 1 + n, 1);
  return [d.getFullYear(), d.getMonth() + 1];
}
function initMonth() {
  const [ny, nm]   = addMonth(curY, curM, 1);
  const [ny2, nm2] = addMonth(curY, curM, 2);
  if (!confirm(`${curY}년 ${curM}월·${nm}월·${nm2}월 근무표를 현재 인원 기준으로 초기화합니다.\n출근시간과 휴무일을 새로 생성합니다.`)) return;
  if (employees.length === 0) { alert('직원 데이터가 없습니다. 새로고침 후 시도해주세요.'); return; }

  schData = buildMonthSchedule(curY, curM);
  const d1 = buildMonthSchedule(ny, nm), d2 = buildMonthSchedule(ny2, nm2);
  saveLs(curY, curM, schData); saveLs(ny, nm, d1); saveLs(ny2, nm2, d2);
  clearTimeout(_saveTimer); dirty = false;
  buildTable();
  setStat(`${curY}년 ${curM}월·${nm}월·${nm2}월 초기화 완료 · Firebase 동기화 중...`);
  setFbStatus(null, '📤 동기화 중...');
  Promise.all([fbSet(curY,curM,schData), fbSet(ny,nm,d1), fbSet(ny2,nm2,d2)])
    .then(() => {
      setFbStatus(true, '🟢 Firebase 동기화됨');
      setStat(`${curY}년 ${curM}월·${nm}월·${nm2}월 초기화 + Firebase 동기화 완료`);
    })
    .catch(e => {
      setFbStatus(false, '🔴 동기화 실패: ' + e.message);
      setStat(`초기화 완료 · Firebase 동기화 실패`);
    });
}

/* ── 저장 ── */
/* ── 자동 저장 (변경 후 1.5초 디바운스) ── */
let _saveTimer = null;
function scheduleAutoSave() {
  dirty = true;
  setStat('변경됨 · 저장 중...');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(autoSave, 1500);
}
function autoSave() {
  saveLs(curY, curM, schData);
  dirty = false;
  setFbStatus(null, '📤 저장 중...');
  fbSet(curY, curM, schData)
    .then(() => {
      setFbStatus(true, '🟢 저장 완료');
      setStat('자동 저장 완료 · ' + new Date().toLocaleTimeString('ko-KR'));
    })
    .catch(e => {
      setFbStatus(false, '🔴 저장 실패: ' + e.message);
      setStat('로컬 저장됨 · Firebase 오류');
    });
}

/* ── 테이블 빌드 ── */
function addHours(t, h) {
  const [hh,mm] = t.split(':').map(Number);
  const tot = hh*60 + mm + h*60;
  return String(~~(tot/60)).padStart(2,'0') + ':' + String(tot%60).padStart(2,'0');
}
function parseWorkType(str) {
  const dm = (str||'').match(/주\s*(\d)\s*일/);
  const hm = (str||'').match(/(\d+)\s*시간/);
  return { days: dm?parseInt(dm[1]):5, hours: hm?parseInt(hm[1]):8 };
}

// 출근 가능 시간 목록 — 최대 출근시간은 (21 - storeHours)시, 퇴근 ≤ 21:00 보장
function getSlots(storeHours) {
  const r = [];
  for (let h = 10; h <= 21 - storeHours; h++) r.push(`${String(h).padStart(2,'0')}:00`);
  return r.length ? r : ['10:00'];
}

function mkEntry(emp) {
  const wt = parseWorkType(emp.work_type||'');
  const belt = emp.belt || '화이트';
  const storeHours = wt.hours + 1; // +1 휴게 포함 매장 상주 시간
  const slots = getSlots(storeHours);
  return { name:emp.name, branch:emp.branch, belt, hire_date:emp.hire_date||'',
           exit_date:emp.exit_date||'', work_type:emp.work_type||'',
           shift_hours:storeHours, shift_slots:slots, shift_starts:{}, off_days:[] };
}

function buildTable() {
  const branch = document.getElementById('branch-sel').value;
  const days = new Date(curY, curM, 0).getDate();
  const holidays = getHolidays(curY);

  let emps = employees.filter(e => !branch || e.branch === branch);
  // 퇴사월이 현재 월보다 이전인 직원 행 제외
  emps = emps.filter(e => {
    if (!e.exit_date || e.exit_date.length < 10) return true;
    const [ey, em] = e.exit_date.split('-').map(Number);
    return !(ey < curY || (ey === curY && em < curM));
  });
  emps.sort((a,b) => {
    const ba=parseInt(a.branch)||999, bb=parseInt(b.branch)||999;
    if (ba!==bb) return ba-bb;
    return (BELT_ORDER.indexOf(a.belt)??8)-(BELT_ORDER.indexOf(b.belt)??8);
  });

  let hd = '<tr><th class="th-name">직원</th><th class="th-shift">근무시간</th>';
  for (let d=1; d<=days; d++) {
    const dow = new Date(curY, curM-1, d).getDay();
    const hkey = String(curM).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isHol = hkey in holidays;
    let cls = dow===0 ? 'th-sun' : (dow===6 ? 'th-sat' : '');
    if (isHol) cls = 'th-holiday';
    hd += `<th class="${cls}"${isHol?` title="${holidays[hkey]}"`:''} >${d}<br><span style="font-size:9px;font-weight:400">${KD[dow]}</span></th>`;
  }
  hd += '<th style="background:#2a2a4e;min-width:32px">근무</th><th style="background:#2a2a4e;min-width:32px">휴무</th></tr>';
  document.getElementById('sch-head').innerHTML = hd;

  // 지점 내 순번 사전 계산 (로테이션 폴백용)
  const branchCounter = {};
  const branchPosMap  = {};
  emps.forEach(e => {
    const k = e.branch + '||' + e.name;
    branchCounter[e.branch] = (branchCounter[e.branch] || 0);
    branchPosMap[k] = branchCounter[e.branch]++;
  });

  let body = '';
  let lastBranch = null;
  emps.forEach(emp => {
    const key = emp.branch + '||' + emp.name;
    const sd = schData[key] || {};
    const belt  = sd.belt || emp.belt || '화이트';

    // 상주 시간: 새 형식(storeHours) 또는 구 형식(workHours) + 1 폴백
    const hours = sd.shift_hours || (BELT_HOURS[belt]||8) + 1;

    // 슬롯: 새 데이터는 shift_slots 사용, 구 데이터는 workHours에서 역산
    const slots = (sd.shift_slots && sd.shift_slots.length)
      ? sd.shift_slots
      : getSlots((sd.shift_hours || BELT_HOURS[belt] || 8) + 1);

    const slotsText = slots.join('/');
    const offs = sd.off_days || [];
    const hd2      = sd.hire_date || emp.hire_date || '';
    const exitDate = sd.exit_date || emp.exit_date || '';

    // 로테이션 파라미터 (새 데이터는 shift_base_offset 사용, 구 데이터는 branchPosMap 폴백)
    const ROT_INT  = sd.rotation_interval || 2;
    const basePos  = sd.shift_base_offset !== undefined ? sd.shift_base_offset : (branchPosMap[key] || 0);

    if (!branch && emp.branch !== lastBranch) {
      body += `<tr class="branch-row"><td colspan="${days+4}">📍 ${emp.branch}</td></tr>`;
      lastBranch = emp.branch;
    }

    const empRole = emp.role && emp.role.includes('매니저') ? 'M' : 'B';
    let empPrefix = '';
    if (hd2) { const pp = hd2.split('-'); empPrefix = String(pp[0]).slice(2)+'.'+pp[1]; }
    const empTag = empPrefix ? `${empPrefix}.${emp.name}.${empRole}` : `${emp.name}.${empRole}`;

    const bS = BS[belt]||{bg:'#eee',fg:'#333'};
    let workCnt=0, offCnt=0, cells='';
    for (let d=1; d<=days; d++) {
      const dow = new Date(curY, curM-1, d).getDay();
      const hkey2 = String(curM).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const holCls = (hkey2 in holidays) ? ' td-holiday' : '';

      let beforeHire = false;
      if (hd2 && hd2.length >= 10) {
        const [hy,hm,hdd] = hd2.split('-').map(Number);
        if (curY<hy||(curY===hy&&curM<hm)||(curY===hy&&curM===hm&&d<hdd)) beforeHire=true;
      }

      let afterExit = false;
      if (exitDate && exitDate.length >= 10) {
        const [ey,em,edd] = exitDate.split('-').map(Number);
        if (curY>ey||(curY===ey&&curM>em)||(curY===ey&&curM===em&&d>edd)) afterExit=true;
      }

      if (beforeHire || afterExit) {
        cells += `<td class="${holCls}"><span class="d-none">—</span></td>`;
      } else if (offs.includes(d)) {
        offCnt++;
        cells += `<td class="${holCls}" onclick="toggle('${key}',${d})"><span class="d-off">휴무</span></td>`;
      } else {
        workCnt++;
        // 출근시간: 새 데이터(shift_starts 맵) 우선, 없으면 로테이션 공식으로 계산
        const rot = Math.floor((d - 1) / ROT_INT);
        const ds  = (sd.shift_starts && sd.shift_starts[String(d)])
                 || slots[(basePos + rot) % slots.length];
        const de  = addHours(ds, hours);
        cells += `<td class="${holCls}" onclick="toggle('${key}',${d})"><span class="d-work">${ds}<br>${de}</span></td>`;
      }
    }

    body += `<tr>
      <td class="td-name"><div class="emp-cell">
        <span class="belt-badge" style="background:${bS.bg};color:${bS.fg}">${belt}</span>
        <button class="emp-name-btn" onclick="openModal('${key}')">${empTag}</button>
      </div></td>
      <td class="td-shift">${slotsText}<br><span style="color:#aaa;font-size:9px">(${hours}h상주)</span></td>
      ${cells}
      <td class="cnt-work">${workCnt}</td>
      <td class="cnt-off">${offCnt}</td>
    </tr>`;
  });
  document.getElementById('sch-body').innerHTML = body;
}

function toggle(key, day) {
  if (!schData[key]) {
    const emp = employees.find(e => e.branch+'||'+e.name===key);
    schData[key] = mkEntry(emp || {name:'',branch:'',belt:'화이트',hire_date:''});
  }
  const offs = schData[key].off_days || (schData[key].off_days=[]);
  const idx = offs.indexOf(day);
  if (idx>=0) offs.splice(idx,1); else offs.push(day);
  buildTable();
  scheduleAutoSave();
}

/* ── Shift Modal ── */
function openModal(key) {
  editKey = key;
  const sd  = schData[key] || {};
  const emp = employees.find(e => e.branch+'||'+e.name === key) || {};
  const belt  = sd.belt || emp.belt || '화이트';
  const wt    = parseWorkType(sd.work_type || emp.work_type || '');
  const hours = sd.shift_hours || wt.hours + 1 || (BELT_HOURS[belt]||8) + 1;
  const curSlot = sd.shift_slots && sd.shift_slots[0] || sd.shift_start || DEFAULT_START;
  document.getElementById('modal-title').textContent = `${emp.name||''} 출근 시간 고정 (${belt} · ${hours}h 상주) — 저장 시 로테이션 해제`;
  document.getElementById('m-start').value = curSlot;
  updatePreview();
  document.getElementById('modal').classList.add('open');
}
function updatePreview() {
  if (!editKey) return;
  const sd  = schData[editKey] || {};
  const emp = employees.find(e => e.branch+'||'+e.name === editKey) || {};
  const belt  = sd.belt || emp.belt || '화이트';
  const wt    = parseWorkType(sd.work_type || emp.work_type || '');
  const hours = sd.shift_hours || wt.hours + 1 || (BELT_HOURS[belt]||8) + 1;
  const start = document.getElementById('m-start').value;
  document.getElementById('m-preview').textContent = `퇴근: ${start} + ${hours}h → ${addHours(start, hours)}`;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editKey=null; }
function saveModal() {
  if (!editKey) return;
  const start = document.getElementById('m-start').value;
  if (!schData[editKey]) {
    const emp = employees.find(e=>e.branch+'||'+e.name===editKey);
    schData[editKey] = mkEntry(emp||{name:'',branch:'',belt:'화이트',hire_date:''});
  }
  // 고정 시간 설정: 전 날짜에 동일 적용, 로테이션 해제
  const totalDays = new Date(curY, curM, 0).getDate();
  const fixedStarts = {};
  for (let d = 1; d <= totalDays; d++) fixedStarts[String(d)] = start;
  schData[editKey].shift_starts = fixedStarts;
  schData[editKey].shift_slots  = [start];
  closeModal();
  buildTable();
  scheduleAutoSave();
}

/* ── Nav ── */
function prevMonth() {
  clearTimeout(_saveTimer); dirty = false;
  curM--; if (curM<1){curM=12;curY--;} renderSchedule();
}
function nextMonth() {
  clearTimeout(_saveTimer); dirty = false;
  curM++; if (curM>12){curM=1;curY++;} renderSchedule();
}
function populateBranches() {
  const branches = [...new Set(employees.map(e=>e.branch))].sort((a,b)=>(parseInt(a)||999)-(parseInt(b)||999));
  const sel = document.getElementById('branch-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체 지점</option>' + branches.map(b=>`<option value="${b}">${b}</option>`).join('');
  if (cur && branches.includes(cur)) sel.value = cur;
}
function setStat(msg) { document.getElementById('stat-text').textContent = msg; }

/* ── 엑셀 다운로드 ── */
async function downloadExcel() {
  const days = new Date(curY, curM, 0).getDate();
  const holidays = getHolidays(curY);

  let emps = employees.slice();
  emps = emps.filter(e => {
    if (!e.exit_date || e.exit_date.length < 10) return true;
    const [ey, em] = e.exit_date.split('-').map(Number);
    return !(ey < curY || (ey === curY && em < curM));
  });
  emps.sort((a,b) => {
    const ba=parseInt(a.branch)||999, bb=parseInt(b.branch)||999;
    if (ba!==bb) return ba-bb;
    return (BELT_ORDER.indexOf(a.belt)??8)-(BELT_ORDER.indexOf(b.belt)??8);
  });

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet(`${curY}년${curM}월`);

  // 열 너비
  ws.getColumn(1).width = 10;  // 지점
  ws.getColumn(2).width = 14;  // 이름
  ws.getColumn(3).width = 7;   // 벨트
  for (let d = 1; d <= days; d++) ws.getColumn(d + 3).width = 10;
  ws.getColumn(days + 4).width = 7;  // 총 근무
  ws.getColumn(days + 5).width = 7;  // 총 휴무

  // 제목 행
  const titleRow = ws.addRow([`끌리메 근무표 ${curY}년 ${curM}월`]);
  ws.mergeCells(1, 1, 1, days + 5);
  Object.assign(titleRow.getCell(1), {
    font: { bold: true, size: 14, color: { argb: 'FFFFFFFF' } },
    alignment: { horizontal: 'center', vertical: 'middle' },
    fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1a1a2e' } }
  });
  titleRow.height = 24;

  // 헤더 행
  const hdCols = ['지점', '이름', '벨트'];
  for (let d = 1; d <= days; d++) {
    const dow = new Date(curY, curM-1, d).getDay();
    const hkey = String(curM).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dowName = ['일','월','화','수','목','금','토'][dow];
    const isHol = hkey in holidays;
    hdCols.push(`${d}\n${dowName}${isHol ? '\n공휴일' : ''}`);
  }
  hdCols.push('근무', '휴무');
  const hdrRow = ws.addRow(hdCols);
  hdrRow.height = 32;
  hdrRow.eachCell((cell, colN) => {
    const dow = colN >= 4 && colN <= days + 3 ? new Date(curY, curM-1, colN-3).getDay() : -1;
    const hkey = colN >= 4 && colN <= days + 3
      ? String(curM).padStart(2,'0') + '-' + String(colN-3).padStart(2,'0') : '';
    const isHol = hkey && (hkey in holidays);
    let bg = 'FF1a1a2e';
    if (isHol) bg = 'FFC62828';
    else if (dow === 0) bg = 'FF922B21';
    else if (dow === 6) bg = 'FF1A5276';
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bg } };
    cell.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 10 };
    cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
    cell.border = { bottom: { style: 'thin', color: { argb: 'FF444444' } } };
  });

  // 데이터 행
  const branchCounter = {};
  const branchPosMap = {};
  emps.forEach(e => {
    const k = e.branch + '||' + e.name;
    branchCounter[e.branch] = branchCounter[e.branch] || 0;
    branchPosMap[k] = branchCounter[e.branch]++;
  });

  let lastBranch = null;
  const WORK_FILL = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFE8F5E9' } };
  const OFF_FILL  = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFFFF3E0' } };
  const NONE_FILL = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFF5F5F5' } };
  const BRANCH_FILL = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFE8EAF6' } };

  emps.forEach(emp => {
    const key = emp.branch + '||' + emp.name;
    const sd   = schData[key] || {};
    const belt = sd.belt || emp.belt || '화이트';
    const hours = sd.shift_hours || (BELT_HOURS[belt]||8) + 1;
    const slots = (sd.shift_slots && sd.shift_slots.length) ? sd.shift_slots : getSlots(hours);
    const offs  = sd.off_days || [];
    const hd2   = sd.hire_date || emp.hire_date || '';
    const exitDate = sd.exit_date || emp.exit_date || '';
    const ROT_INT = sd.rotation_interval || 2;
    const basePos = sd.shift_base_offset !== undefined ? sd.shift_base_offset : (branchPosMap[key] || 0);

    // 지점 구분 행
    if (emp.branch !== lastBranch) {
      const brRow = ws.addRow([`📍 ${emp.branch}`, '', '', ...Array(days + 2).fill('')]);
      ws.mergeCells(brRow.number, 1, brRow.number, days + 5);
      brRow.getCell(1).fill = BRANCH_FILL;
      brRow.getCell(1).font = { bold: true, size: 11, color: { argb: 'FF3949AB' } };
      brRow.getCell(1).alignment = { vertical: 'middle' };
      brRow.height = 18;
      lastBranch = emp.branch;
    }

    const rowData = [emp.branch, emp.name, belt];
    const cellStyles = [null, null, null];
    let workCnt = 0, offCnt = 0;

    for (let d = 1; d <= days; d++) {
      let beforeHire = false, afterExit = false;
      if (hd2 && hd2.length >= 10) {
        const [hy,hm,hdd] = hd2.split('-').map(Number);
        if (curY<hy||(curY===hy&&curM<hm)||(curY===hy&&curM===hm&&d<hdd)) beforeHire=true;
      }
      if (exitDate && exitDate.length >= 10) {
        const [ey,em,edd] = exitDate.split('-').map(Number);
        if (curY>ey||(curY===ey&&curM>em)||(curY===ey&&curM===em&&d>edd)) afterExit=true;
      }

      if (beforeHire || afterExit) {
        rowData.push('—');
        cellStyles.push(NONE_FILL);
      } else if (offs.includes(d)) {
        offCnt++;
        rowData.push('휴무');
        cellStyles.push(OFF_FILL);
      } else {
        workCnt++;
        const rot = Math.floor((d - 1) / ROT_INT);
        const ds = (sd.shift_starts && sd.shift_starts[String(d)]) || slots[(basePos + rot) % slots.length];
        const de = addHours(ds, hours);
        rowData.push(`${ds}~${de}`);
        cellStyles.push(WORK_FILL);
      }
    }
    rowData.push(workCnt, offCnt);
    cellStyles.push(null, null);

    const dataRow = ws.addRow(rowData);
    dataRow.height = 16;
    dataRow.eachCell((cell, colN) => {
      const style = cellStyles[colN - 1];
      if (style) cell.fill = style;
      cell.alignment = { horizontal: 'center', vertical: 'middle' };
      cell.font = { size: 9 };
      cell.border = {
        bottom: { style: 'hair', color: { argb: 'FFE0E0E0' } },
        right:  { style: 'hair', color: { argb: 'FFE0E0E0' } }
      };
      // 이름·지점은 좌측 정렬
      if (colN <= 2) cell.alignment = { horizontal: 'left', vertical: 'middle' };
    });
  });

  // 다운로드
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `끌리메_근무표_${curY}년${String(curM).padStart(2,'0')}월.xlsx`;
  a.click();
  URL.revokeObjectURL(a.href);
}
