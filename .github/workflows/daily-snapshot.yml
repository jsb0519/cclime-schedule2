name: 일별 근무표 스냅샷

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 15:00 UTC = 00:00 KST
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 근무표 스냅샷 저장
        run: python snapshot_schedule.py
